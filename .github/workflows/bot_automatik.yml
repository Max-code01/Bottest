name: OMNI-GOD V5 EXTREME RUNNER

on:
  schedule:
    # Läuft alle 30 Minuten
    - cron: '*/30 * * * *' 
  workflow_dispatch: # Erlaubt manuellen Start jederzeit

permissions:
  contents: write # Zwingend erforderlich für das Live-Dashboard und die DB

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright google-generativeai
          playwright install chromium
          playwright install-deps chromium

      - name: Run Python Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }} # Muss in GitHub Secrets angelegt sein
        run: xvfb-run --auto-servernum python bot_python.py

      - name: Save Data, Screenshots & Push Dashboard
        if: always()
        run: |
          git config --global user.name "OmniGod-Bot-System"
          git config --global user.email "max.schule13@gmail.com"
          
          # Sicherheits-Check: Holt den neuesten Stand, falls du im Browser etwas geändert hast
          git pull origin main --rebase || echo "Pull übersprungen"
          
          # Fügt alles hinzu: HTML, Datenbank, Logfile und ALLE generierten Bilder/Screenshots (*.png)
          git add index.html bot_data.db ultra_god_mode_v5_HYBRID.log *.png -f || echo "Dateien fehlen, fahre trotzdem fort"
          
          # Prüft, ob es Änderungen gibt, und pusht sie dann live
          git diff --staged --quiet || (git commit -m "🚀 OMNI-GOD V5: Data & Screenshots Update [$(date +'%d.%m.%Y %H:%M')]" && git push)

      - name: Upload Artifacts (Sicherheits-Backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-live-status-dashboard
          path: |
            index.html
            *.png
            ultra_god_mode_v5_HYBRID.log
            bot_data.db
          retention-days: 3 # Speichert die Screenshots und DB für 3 Tage als ZIP-Download
