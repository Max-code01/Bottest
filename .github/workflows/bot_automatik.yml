name: Schach Bot Automatik (Python)
on:
  schedule:
    - cron: '0 * * * *' # Läuft jede Stunde automatisch
  workflow_dispatch: # Erlaubt es dir, den Bot jederzeit manuell zu starten

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # WICHTIG: Das hier erlaubt dem Bot, das Live-Dashboard in dein Repo zu pushen
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Lädt die gesamte History für saubere Git-Pushes

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Run Python Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Das GITHUB_TOKEN wird für den automatischen Live-Push benötigt
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: xvfb-run --auto-servernum python bot_python.py

      - name: Upload Dashboard and Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-live-status-dashboard
          path: |
            index.html
            latest_action.png
            ultra_god_mode_v3_EXTREME.log
            error_*.png
          retention-days: 1
