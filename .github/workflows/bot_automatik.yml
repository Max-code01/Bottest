name: OMNI-GOD V5 EXTREME RUNNER

on:
  schedule:
    # Läuft jede Stunde (wie von dir eingestellt)
    - cron: '0 * * * *' 
  workflow_dispatch: # Erlaubt manuellen Start

permissions:
  contents: write # Erlaubt dem Bot das Dashboard und die DB zu speichern

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Wichtig für saubere Git-Historie

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Falls keine requirements.txt da ist, installieren wir direkt:
          pip install playwright google-generativeai
          # Playwright Browser und System-Abhängigkeiten
          playwright install chromium
          playwright install-deps chromium

      - name: Run Python Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # xvfb-run simuliert einen Bildschirm für die Browser-Fenster
        run: xvfb-run --auto-servernum python bot_python.py

      - name: Save Data & Push Dashboard
        # Dieser Schritt schreibt die index.html und die bot_data.db zurück in dein Repo
        if: always()
        run: |
          git config --global user.name "OmniGod-Bot-System"
          git config --global user.email "bot@omnigod.com"
          # Fügt alle Änderungen (Dashboard, Logs, Datenbank) hinzu
          git add index.html bot_data.db ultra_god_mode_v5_HYBRID.log || echo "Keine Logs gefunden"
          # Commit nur, wenn sich auch wirklich was geändert hat
          git commit -m "🚀 OMNI-GOD V5: Live-Update [$(date +'%Y-%m-%d %H:%M')]" || echo "Keine Änderungen zum Committen"
          git push

      - name: Upload Artifacts (Backup)
        # Zusätzliches Backup in den Actions-Tab (dein alter Part)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-live-status-dashboard
          path: |
            index.html
            latest_action.png
            ultra_god_mode_v5_HYBRID.log
            bot_data.db
            error_*.png
          retention-days: 1
